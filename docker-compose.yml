version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: pms-postgres
    environment:
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: pms_password
      POSTGRES_DB: pms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pms-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
